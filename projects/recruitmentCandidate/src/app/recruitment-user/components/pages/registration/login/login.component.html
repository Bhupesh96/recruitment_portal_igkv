<div
  class="w-full max-w-md mx-auto p-6 sm:p-8 bg-white rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-gray-200 font-['Source Sans Pro',sans-serif]"
>
  <!-- Title -->
  <h2 class="text-3xl font-bold text-gray-900 mb-1 text-center tracking-tight">
    Log In
  </h2>
  <p class="text-center text-gray-600 text-base mb-8">
    Access your recruitment dashboard
  </p>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-5">
    <!-- Registration Number -->
    <div>
      <label class="block text-base font-semibold text-gray-800 mb-1.5">
        Registration Number <span class="text-red-700">*</span>
      </label>

      <div class="relative">
        <span class="absolute inset-y-0 left-0 w-11 flex items-center justify-center text-blue-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14c4.418 0 8-2.239 8-5s-3.582-5-8-5-8 2.239-8 5 3.582 5 8 5z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 17c1.5-2 4.5-3 7-3s5.5 1 7 3" />
          </svg>
        </span>

        <input
          type="number"
          formControlName="user_id"
          placeholder="Registration number"
          class="w-full border border-gray-300 rounded-lg pl-11 pr-4 py-2.5 text-base text-gray-900 focus:ring-1 focus:ring-gray-400 focus:border-gray-400 outline-none transition"
        />
      </div>
    </div>

    <!-- Password -->
    <div>
      <label class="block text-base font-semibold text-gray-800 mb-1.5">
        Password <span class="text-red-700">*</span>
      </label>

      <div class="relative">
        <span class="absolute inset-y-0 left-0 w-11 flex items-center justify-center text-blue-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 11V7a5 5 0 10-10 0v4H5v10h14V11h-2z" />
          </svg>
        </span>

        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Password"
          class="w-full border border-gray-300 rounded-lg pl-11 pr-11 py-2.5 text-base text-gray-900 focus:ring-1 focus:ring-gray-400 focus:border-gray-400 outline-none transition"
        />

        <!-- Eye Toggle -->
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute inset-y-0 right-0 w-11 flex items-center justify-center text-gray-500 hover:text-blue-700 transition-colors"
          aria-label="Toggle password visibility"
        >
          <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M6.81 6.792A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.963 9.963 0 01-4.058 5.319" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Captcha Section (Optimized for Sidebar) -->
    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
      <!-- Row 1: Captcha Image Container -->
      <div
        #captchaContainer
        class="w-full h-12 flex items-center justify-center bg-white rounded border border-gray-300 overflow-hidden mb-3"
      ></div>

      <!-- Row 2: Input and Refresh Group -->
      <div class="flex items-center gap-2">
        <input
          type="text"
          formControlName="captcha"
          placeholder="Captcha"
          class="flex-grow border border-gray-300 rounded-lg px-3 py-2 text-base bg-white text-gray-900 focus:ring-1 focus:ring-gray-400 outline-none"
        />

        <button
          type="button"
          (click)="getCaptcha()"
          class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-white border border-gray-300 text-gray-600 hover:text-blue-700 hover:border-blue-400 shadow-sm transition-all"
          title="Refresh Captcha"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v6h6M20 20v-6h-6M4 10a9 9 0 0115.5-5.5L20 10M20 14a9 9 0 01-15.5 5.5L4 14" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="loginError" class="p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg text-center font-bold">
      ⚠ {{ loginError }}
    </div>

    <!-- Submit Button (Unified Blue-700) -->
    <button
      type="submit"
      [disabled]="loginForm.invalid"
      class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold text-base h-12 rounded-lg shadow-sm transition-all disabled:bg-blue-300 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
      </svg>
      Log In
    </button>
  </form>
</div>
