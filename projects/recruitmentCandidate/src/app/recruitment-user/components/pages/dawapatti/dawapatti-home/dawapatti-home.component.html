<!-- Global layout -->
<div class="flex flex-col h-screen overflow-hidden">
  <!-- Header (fixed) -->
  <app-dawapatti-header></app-dawapatti-header>

  <div class="flex flex-1 overflow-hidden">

    <!-- ✅ Sidebar: Listen for the (viewChanged) event -->
    <app-sidenav (viewChanged)="activeView = $event"></app-sidenav>

    <!-- Main Content Wrapper -->
    <main class="flex-1 bg-gray-200 p-6 overflow-y-auto">
      <div class="min-h-full">

        <!-- ✅ Replace router-outlet with Dynamic Switch -->
        <ng-container [ngSwitch]="activeView">

          <!-- Render the form if activeView is 'recruitment-form' -->
          <app-stepper *ngSwitchCase="'recruitment-form'"></app-stepper>

          <!-- Render Score Card if activeView is 'score-card' -->

          <app-scorecard *ngSwitchCase="'score-card'"></app-scorecard>
          <!-- Render Dawapatti if activeView is 'dawapatti' -->
          <app-dawapatti *ngSwitchCase="'dawapatti'"></app-dawapatti>

        </ng-container>

      </div>
    </main>

  </div>

  <!-- Footer -->
  <app-footer></app-footer>
</div>
